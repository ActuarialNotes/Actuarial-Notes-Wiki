name: CI

# Gate every change to the quiz app on lint, typecheck, unit tests, a production
# build, and a Playwright E2E smoke suite (critical signed-out paths). Runs on
# PRs and on pushes to main. Path-filtered to the app and this workflow so
# unrelated content-only changes don't spend CI minutes.
on:
  pull_request:
    paths:
      - 'quiz/**'
      - '.github/workflows/ci.yml'
  push:
    branches: [main]
    paths:
      - 'quiz/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR branch).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: lint · typecheck · test · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: quiz
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: quiz/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      # `npm run build` runs `tsc && vite build`, so this covers both the
      # typecheck and the production bundle in one step.
      - name: Build
        run: npm run build

  e2e:
    name: e2e smoke (playwright)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: quiz
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: quiz/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Reuse the CI-pinned @playwright/test version's matching browser.
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      # playwright.config.ts's webServer builds + previews the app and injects
      # inert Supabase placeholders, so no secrets are needed: every asserted
      # flow works signed-out from bundled content + localStorage.
      - name: Run E2E smoke suite
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: quiz/playwright-report/
          retention-days: 7
