name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy edge functions
        run: |
          # Bundling resolves remote imports (e.g. esm.sh), which intermittently
          # return 5xx (522) and fail the whole deploy. Retry each deploy a few
          # times with backoff so a transient CDN blip doesn't break the run.
          deploy() {
            local fn="$1"; shift
            local attempt
            for attempt in 1 2 3; do
              if supabase functions deploy "$fn" --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} "$@"; then
                return 0
              fi
              echo "::warning::deploy of $fn failed (attempt $attempt/3), retrying in $((attempt * 10))s"
              sleep $((attempt * 10))
            done
            echo "::error::deploy of $fn failed after 3 attempts"
            return 1
          }

          deploy stripe-create-checkout
          deploy stripe-create-portal
          deploy stripe-webhook
          deploy delete-account
          deploy redeem-beta-code
          deploy research-ingest --no-verify-jwt
          deploy research-ingest-url
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
